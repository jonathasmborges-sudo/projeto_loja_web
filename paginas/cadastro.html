<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MRFAB Autocenter</title>

    <link rel="stylesheet" href="../css/style_formulario.css">

    <script src="../js/consulta_cep.js" defer></script>
</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">
                MRFAB Autocenter
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="cadastro.html" class="ativo">Cadastro</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li>
                        <a href="carrinho.html">
                            <img src="../imagens/icone_carrinho_de_compras.png" alt="Carrinho">
                        </a>
                    </li>
                </ul>
            </nav>

        </header>

        <section id="form-area">

            <h2>Cadastro de Cliente</h2>

            <form id="form-pessoa">

                <label>Nome</label>
                <input type="text" class="input01" placeholder="Digite seu nome">

                <label>Sobrenome</label>
                <input type="text" class="input01" placeholder="Digite seu sobrenome">

                <label>CPF</label>
                <input type="text" class="input01" placeholder="Digite seu CPF">

                <label>Telefone</label>
                <input type="tel" class="input01" placeholder="Digite seu telefone">

                <label>E-mail</label>
                <input type="email" class="input01" placeholder="Digite seu e-mail">

                <label>Data de Nascimento</label>
                <input type="date" class="input01">

                <label>CEP</label>
                <input type="text" class="input01" placeholder="Digite seu CEP">

                <label>Logradouro</label>
                <input type="text" class="input01">

                <label>Número</label>
                <input type="text" class="input01">

                <label>Complemento</label>
                <input type="text" class="input01">

                <label>Bairro</label>
                <input type="text" class="input01">

                <label>Cidade</label>
                <input type="text" class="input01">

                <label>Estado</label>
                <input type="text" class="input01" maxlength="2">

                <label>Senha</label>
                <input type="password" class="input01">

                <button type="submit" class="btn-add">Cadastrar</button>
                <button type="reset" class="btn-add">Limpar</button>

            </form>

        </section>

        <footer id="rodape">
            <h2>&copy; 2026 MRFAB Autocenter</h2>
            <p>Pix, Cartão de Débito e Crédito</p>
        </footer>

    </main>

</body>

</html>
