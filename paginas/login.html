<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MRFAB Autocenter</title>

    <link rel="stylesheet" href="../css/style_login.css">
</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">
                MRFAB Autocenter
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="login.html" class="ativo">Login</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li>
                        <a href="carrinho.html">
                            <img src="../imagens/icone_carrinho_de_compras.png" alt="Carrinho">
                        </a>
                    </li>
                </ul>
            </nav>

        </header>

        <section id="login-area">

            <h2>Login</h2>

            <form id="form-login">

                <label>E-mail</label>
                <input type="email" class="input01" placeholder="Digite seu e-mail">

                <label>Senha</label>
                <input type="password" class="input01" placeholder="Digite sua senha">

                <button type="submit" class="btn-login">
                    Entrar
                </button>

            </form>

            <p>
                Ainda não possui cadastro?
                <a href="cadastro.html">Cadastre-se</a>
            </p>

        </section>

        <footer id="rodape">
            <h2>&copy; 2026 MRFAB Autocenter S.A. Todos os direitos reservados.</h2>
            <p>Formas de pagamento: Pix, Cartões de Débito e Crédito.</p>
        </footer>

    </main>

</body>

</html>
